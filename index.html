<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidco SEO Bulk Automation - Full Edition</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 95%; max-width: 1250px; margin: 20px auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 2.5rem; background: linear-gradient(to right, #60a5fa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: var(--text-muted); padding: 10px 20px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: 0.3s; border-radius: 8px; }
        .tab-btn.active { color: var(--text-main); background: var(--card-bg); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 24px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border: 1px solid var(--border); margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; }
        textarea { width: 100%; height: 150px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 8px; color: var(--text-main); padding: 12px; font-family: inherit; resize: vertical; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn:hover { background: var(--primary-hover); }
        .btn:disabled { background: var(--border); cursor: not-allowed; }
        .btn-success { background: var(--success); }
        .btn-warning { background: var(--warning); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border); color: var(--text-muted); font-weight: 600; }
        td { padding: 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; }
        .status-pending { background: #334155; color: #94a3b8; }
        .status-running { background: #1e3a8a; color: #60a5fa; animation: pulse 2s infinite; }
        .status-success { background: #064e3b; color: #34d399; }
        .status-error { background: #7f1d1d; color: #f87171; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .code-box { background: #000; padding: 4px 8px; border-radius: 4px; font-family: monospace; font-size: 0.8rem; color: #10b981; border: 1px solid #334155; max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; }
        .login-cell { display: flex; gap: 5px; align-items: center; }
        .btn-mini { padding: 4px 8px; font-size: 0.75rem; border-radius: 4px; background: var(--border); color: var(--text-main); border: 1px solid transparent; cursor: pointer; }
        .btn-mini:hover { border-color: var(--primary); }
        .btn-main { background: var(--primary); }
        .check-options { display: flex; gap: 20px; margin-bottom: 15px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; }
        .check-options label { display: flex; align-items: center; gap: 5px; cursor: pointer; color: var(--text-main); }
        .match-box { padding: 5px; border-radius: 4px; border: 1px solid transparent; }
        .mismatch { border-color: var(--danger); background: rgba(239, 68, 68, 0.1); }
        .match { border-color: var(--success); background: rgba(16, 185, 129, 0.05); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Vidco SEO Bulk Automation</h1>
        <p style="color:var(--text-muted)">Hệ thống quản lý GSC & Giám sát 301 chuyên nghiệp</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('tab1')">➕ Thêm GSC Bulk</button>
        <button class="tab-btn" onclick="showTab('tab2')">🔍 Check Website Status</button>
    </div>

    <!-- TAB 1: ADD GSC -->
    <div id="tab1" class="tab-content active">
        <div class="card">
            <h3 style="margin-top:0">Nhập danh sách Website (Google Search Console)</h3>
            <div class="form-group">
                <label>Mỗi website một dòng:</label>
                <textarea id="domainList" placeholder="https://example1.com&#10;https://example2.com"></textarea>
            </div>
            <button id="btnStart" class="btn">🚀 Bắt đầu thêm & lấy mã</button>
            <p id="authStatus" style="margin-top:10px; font-size:0.9rem; color:var(--warning)"></p>
        </div>

        <div class="card">
            <h3>Kết Quả Xử Lý</h3>
            <table id="resultTable">
                <thead>
                    <tr>
                        <th>Website</th>
                        <th>Trạng thái</th>
                        <th>Xác Minh</th>
                        <th>Mã Meta Tag (HTML)</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="resultBody"></tbody>
            </table>
        </div>
    </div>

    <!-- TAB 2: CHECK STATUS -->
    <div id="tab2" class="tab-content">
        <div class="card">
            <h3 style="margin-top:0">Nhập danh sách Website cần kiểm tra</h3>
            <div class="form-group">
                <label>Nhập mẫu: <b>Gốc [cách] Theo_dõi [cách] đuôi_admin [cách] user [cách] pass</b></label>
                <textarea id="checkDomainList" placeholder="88vin.cx	ydn.uk.com	web_auth	seo	kOqIFJrMBiCDzG"></textarea>
            </div>
            <div class="check-options">
                <label><input type="checkbox" id="optWebsite" checked> 🌐 Trạng thái</label>
                <label><input type="checkbox" id="opt301" checked> 🔄 Kiểm tra 301</label>
                <label><input type="checkbox" id="optAdmin" checked> 🔑 WP-Admin</label>
                <label><input type="checkbox" id="optLogin" checked> 🔐 Đăng nhập nhanh</label>
            </div>
            <button id="btnCheck" class="btn btn-warning">🔍 Bắt đầu kiểm tra</button>
        </div>

        <div class="card">
            <h3>Kết Quả Kiểm Tra</h3>
            <table id="checkResultTable">
                <thead><tr><th>Website URL</th></tr></thead>
                <tbody id="checkResultBody"></tbody>
            </table>
            <div id="actionBars" style="display:none; margin-top:15px; gap:10px; border-top:1px solid var(--border); padding-top:15px; align-items:center;">
                <button class="btn btn-success" style="font-size:13px;" onclick="copyCol('chkMatch_')">📋 Copy Đích Cuối</button>
                <button class="btn" style="background:#6366f1; font-size:13px;" onclick="copyCol('chkChain_')">📋 Copy Chuỗi</button>
                <button class="btn btn-danger" style="font-size:13px;" onclick="filterFails()">🔴 Lọc lỗi Login</button>
                <button class="btn" style="font-size:13px;" onclick="showAll()">📋 Hiện tất cả</button>
                <span id="copyInfo" style="color:var(--text-muted); font-size:12px;"></span>
            </div>
        </div>
    </div>
</div>

<script>
    const CLIENT_ID = '376378457788-i7v1u8pce8j91m9s341g234c9f13eie9.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/webmasters https://www.googleapis.com/auth/siteverification';
    let accessToken = null;

    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- LOGIC TÍNH NĂNG 1: GSC BULK ---
    document.getElementById('btnStart').onclick = () => {
        const domains = document.getElementById('domainList').value.split('\n').filter(d => d.trim());
        if (domains.length === 0) return alert('Nhập domain đã sếp ơi!');
        const client = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES,
            callback: (response) => { accessToken = response.access_token; document.getElementById('authStatus').textContent = '✅ Đã kết nối. Đang xử lý...'; startProcess(domains); }
        });
        client.requestAccessToken();
    };

    async function startProcess(domains) {
        const tbody = document.getElementById('resultBody'); tbody.innerHTML = '';
        const existingSites = await getExistingSites();
        for (let i = 0; i < domains.length; i++) {
            let domain = domains[i].trim(); if (!domain.startsWith('http')) domain = 'https://' + domain; if (!domain.endsWith('/')) domain += '/';
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${domain}</td><td id="st_${i}"><span class="status-badge status-running">Đang check...</span></td><td id="v_${i}">-</td><td id="code_${i}">...</td><td id="act_${i}">-</td>`;
            tbody.appendChild(tr);
            const existing = existingSites.find(s => s.siteUrl === domain);
            if (existing && existing.permissionLevel === 'siteOwner') {
                document.getElementById(`st_${i}`).innerHTML = '<span class="status-badge status-success">Đã tồn tại (Owner)</span>';
                document.getElementById(`v_${i}`).innerHTML = '✅ OK';
                document.getElementById(`code_${i}`).innerHTML = '<span style="color:var(--text-muted)">Đã xác minh xong</span>';
            } else {
                await addSiteToGSC(domain, i);
                await getVerificationTag(domain, i);
            }
        }
    }

    async function getExistingSites() {
        try { const res = await fetch('https://www.googleapis.com/webmasters/v3/sites', { headers: { 'Authorization': `Bearer ${accessToken}` } }); const data = await res.json(); return data.siteEntry || []; } catch (e) { return []; }
    }

    async function addSiteToGSC(domain, idx) {
        try { await fetch(`https://www.googleapis.com/webmasters/v3/sites/${encodeURIComponent(domain)}`, { method: 'PUT', headers: { 'Authorization': `Bearer ${accessToken}` } }); document.getElementById(`st_${idx}`).innerHTML = '<span class="status-badge status-success">Đã thêm</span>'; } catch (e) {}
    }

    async function getVerificationTag(domain, idx) {
        try {
            const res = await fetch(`https://www.googleapis.com/siteVerification/v1/token`, {
                method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ verificationMethod: 'META', site: { identifier: domain, type: 'SITE' } })
            });
            const data = await res.json();
            if (data.token) {
                document.getElementById(`code_${idx}`).innerHTML = `<div class="code-box">${data.token}</div>`;
                document.getElementById(`act_${idx}`).innerHTML = `<button class="btn-mini btn-main" onclick="copyTxt('${data.token.replace(/'/g, "\\'")}')">Copy</button> <button class="btn-mini" style="background:var(--success)" onclick="verifySite('${domain}', ${idx})">⚡ Xác minh</button>`;
            }
        } catch (e) {}
    }

    async function verifySite(domain, idx) {
        try {
            const res = await fetch(`https://www.googleapis.com/siteVerification/v1/webResource?verificationMethod=META`, {
                method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ site: { identifier: domain, type: 'SITE' } })
            });
            if (res.ok) { document.getElementById(`v_${idx}`).innerHTML = '✅ OK!'; document.getElementById(`st_${idx}`).innerHTML = '<span class="status-badge status-success">Đã Xác Minh</span>'; } else { alert('Thất bại! Kiểm tra lại mã trên web.'); }
        } catch (e) {}
    }

    // --- LOGIC TÍNH NĂNG 2: CHECK WEBSITE & DEEP SCAN ---
    const proxies = [
        (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
        (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
    ];

    document.getElementById('btnCheck').onclick = async () => {
        const lines = document.getElementById('checkDomainList').value.split('\n').filter(l => l.trim());
        const opts = { web: document.getElementById('optWebsite').checked, rdr: document.getElementById('opt301').checked, adm: document.getElementById('optAdmin').checked, log: document.getElementById('optLogin').checked };
        const tbody = document.getElementById('checkResultBody');
        const thead = tbody.closest('table').querySelector('thead tr');
        thead.innerHTML = '<th>Website URL</th>';
        if(opts.web) thead.innerHTML += '<th>Trạng thái</th><th>HTTP Code</th>';
        if(opts.rdr) thead.innerHTML += '<th>Chuỗi Redirect</th><th>So khớp 301</th>';
        if(opts.adm) thead.innerHTML += '<th>WP-Admin</th>';
        if(opts.log) thead.innerHTML += '<th>Đăng nhập</th>';
        tbody.innerHTML = '';

        const sites = lines.map(l => {
            const p = l.split(/[\t ]+/);
            return { origin: fixUrl(p[0]), recorded: fixUrl(p[1]||p[0]), admin: p[2]||'wp-admin', user: p[3]||'', pass: p[4]||'' };
        });

        sites.forEach((s, i) => {
            const tr = document.createElement('tr'); tr.id = `row_${i}`;
            let cells = `<td class="domain-cell" style="font-size:12px;"><b>${short(s.origin)}</b><br><span style="color:var(--text-muted)">🎯 ${short(s.recorded)}</span></td>`;
            if(opts.web) cells += `<td id="st2_${i}">...</td><td id="cd2_${i}">-</td>`;
            if(opts.rdr) cells += `<td id="chkChain_${i}">...</td><td id="chkMatch_${i}">...</td>`;
            if(opts.adm) cells += `<td id="chkAdmin_${i}">...</td>`;
            if(opts.log) cells += `<td id="chkLogin_${i}">...</td>`;
            tr.innerHTML = cells; tbody.appendChild(tr);
        });

        document.getElementById('actionBars').style.display = 'flex';

        for (let i = 0; i < sites.length; i++) {
            const s = sites[i]; let actualFinal = s.origin; let chain = [s.origin];

            if (opts.web) {
                try {
                    const res = await fetch(proxies[1](s.origin));
                    document.getElementById(`cd2_${i}`).textContent = res.status;
                    document.getElementById(`st2_${i}`).innerHTML = res.ok ? '<span class="status-badge status-success">✅ Live</span>' : '<span class="status-badge status-error">❌ Die</span>';
                } catch(e) { document.getElementById(`st2_${i}`).innerHTML = 'ERR'; }
            }

            if (opts.rdr) {
                const chainCell = document.getElementById(`chkChain_${i}`);
                const matchCell = document.getElementById(`chkMatch_${i}`);
                chainCell.innerHTML = '<span style="color:var(--warning);font-size:11px">Dò vết...</span>';

                // Deep Scan 1: HackerTarget (Headers)
                try {
                    const htRes = await fetch(`https://api.hackertarget.com/httpheaders/?q=${encodeURIComponent(s.origin)}`);
                    if (htRes.ok) {
                        const headers = await htRes.text();
                        const locs = headers.matchAll(/Location:\s*(https?:\/\/[^\s]+)/gi);
                        for (const m of locs) {
                            let loc = m[1].trim(); if(!chain.includes(loc)) { chain.push(loc); actualFinal = loc; }
                        }
                    }
                } catch(e) {}

                // Deep Scan 2: Content Scan (Meta/JS)
                try {
                    const aoRes = await fetch(proxies[0](s.origin));
                    if (aoRes.ok) {
                        const data = await aoRes.json();
                        if (data.status && data.status.url && !chain.includes(data.status.url)) { chain.push(data.status.url); actualFinal = data.status.url; }
                        const html = data.contents || "";
                        const metaMatch = html.match(/url=([^"']+)["']/i);
                        const jsMatch = html.match(/location\.href\s*=\s*["']([^"']+)["']/i);
                        [metaMatch, jsMatch].forEach(m => { if(m && m[1] && m[1].startsWith('http') && !chain.includes(m[1])) { chain.push(m[1]); actualFinal = m[1]; } });
                    }
                } catch(e) {}

                chainCell.innerHTML = `<div style="font-size:10px">${chain.length>1 ? chain.map(l => short(l)).join(' ➔ ') : 'Không nhảy'}</div>`;
                const isMatch = short(actualFinal) === short(s.recorded);
                matchCell.innerHTML = `
                    <div class="match-box ${isMatch?'match':'mismatch'}">
                        <div style="color:${isMatch?'var(--success)':'var(--danger)'};font-weight:bold;font-size:10px">${isMatch?'✅ KHỚP':'🚨 SAI LỆCH'}</div>
                        <div style="font-size:10px;word-break:break-all">${short(actualFinal)}</div>
                    </div>`;
                matchCell.dataset.url = actualFinal;
            }

            if (opts.adm) {
                try { const res = await fetch(proxies[1](actualFinal + s.admin)); document.getElementById(`chkAdmin_${i}`).innerHTML = res.ok ? '<span class="status-badge status-success">✅ OK</span>' : '<span class="status-badge status-error">❌ Lỗi</span>'; } catch(e) {}
            }

            if (opts.log && s.user) {
                document.getElementById(`chkLogin_${i}`).innerHTML = `
                    <div class="login-cell">
                        <button class="btn-mini btn-main" onclick="openLogin('${actualFinal}','${s.admin}','${s.user}','${s.pass}')">🔑</button>
                        <button class="btn-mini" onclick="copyTxt('${s.user}')">U</button>
                        <button class="btn-mini" onclick="copyTxt('${s.pass}')">P</button>
                        <input type="checkbox" id="loginOk_${i}" checked>
                    </div>`;
            }
        }
    };

    function fixUrl(u) { if(!u) return ''; if(!u.startsWith('http')) u='https://'+u; if(!u.endsWith('/')) u+='/'; return u; }
    function short(u) { return u.replace('https://','').replace('http://','').replace(/\/$/,''); }
    function copyTxt(t) { navigator.clipboard.writeText(t); }
    function openLogin(b, a, u, p) {
        const tab = window.open('', '_blank');
        tab.document.write(`<form id="f" method="POST" action="${b+a}"><input name="log" value="${u}"><input name="pwd" value="${p}"></form><script>document.getElementById('f').submit();<\/script>`);
    }
    function copyCol(prefix) {
        const txt = Array.from(document.querySelectorAll(`[id^="${prefix}"]`)).map(c => c.dataset.url || c.innerText.trim()).join('\n');
        copyTxt(txt); document.getElementById('copyInfo').textContent = '✅ Đã copy!'; setTimeout(()=>document.getElementById('copyInfo').textContent='', 1500);
    }
    function filterFails() { document.querySelectorAll('#checkResultBody tr').forEach(tr => { if(tr.querySelector('input[type="checkbox"]:checked')) tr.style.display='none'; }); }
    function showAll() { document.querySelectorAll('#checkResultBody tr').forEach(tr => tr.style.display=''); }

    const gS = document.createElement('script'); gS.src='https://accounts.google.com/gsi/client'; document.head.appendChild(gS);
</script>
</body>
</html>
